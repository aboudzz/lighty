# SonarQube configuration — used by the sonarqube job in .github/workflows/build.yml
sonar.projectName=lighty
sonar.projectKey=aboudzz_lighty
sonar.organization=aboudzz
sonar.sources=.
sonar.exclusions=__tests__/**,jest.setup.js,jest.config.js,bin/**
sonar.tests=__tests__
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/sonar-report.xml
